<!DOCTYPE HTML>
<html>
<head>
    <meta charset="UTF-8">
    <title>Lista projektów</title>
    <link href="/css/list-style.css" rel="stylesheet"/>
</head>

<body>

<div class="topbar">
    <h2>System zarządzania projektami</h2>

    <button class="logout-btn" onclick="logout()">
        Wyloguj
    </button>
</div>

<div class="root">

    <div class="header-section">
        <h1>Lista projektów</h1>

        <div class="nav-links">
            <a href="/studentList" id="studentsBtn" style="display:none">
                Studenci
            </a>

            <a href="/taskList" id="tasksBtn" style="display:none">
                Zadania
            </a>

            <a href="/projectAdd" id="addProjectBtn" style="display:none">
                Dodaj projekt
            </a>
        </div>
    </div>

    <div class="table-container">

        <table>
            <thead>
            <tr>
                <th>ID</th>
                <th>Nazwa</th>
                <th>Opis</th>
                <th>Utworzony</th>
                <th>Zmodyfikowany</th>
                <th>Twórca</th>
                <th>Akcje</th>
            </tr>
            </thead>

            <tbody id="projekty-body">
            <!-- JS renders rows here -->
            </tbody>

        </table>

    </div>
</div>

<script>
    /* =========================
       AUTH CHECK (GUARD)
    ========================= */
    async function checkAuth() {
        const token = localStorage.getItem("accessToken");

        if (!token) {
            window.location.href = "/login";
            return false;
        }

        const res = await fetch("/api/users/me", {
            headers: {
                "Authorization": "Bearer " + token
            }
        });

        if (res.status === 401) {
            logout();
            return null;
        }

        return await res.json();
    }

    /* =========================
       VERIFY ROLE
    ========================= */
    function setupPermissions(role) {
        const studentsBtn = document.getElementById("studentsBtn");
        const tasksBtn = document.getElementById("tasksBtn");
        const addProjectBtn = document.getElementById("addProjectBtn");

        if (role === "student") {
            tasksBtn.style.display = "inline-block";
        }

        if (role === "prowadzacy") {
            tasksBtn.style.display = "inline-block";
            addProjectBtn.style.display = "inline-block";
        }

        if (role === "admin") {
            studentsBtn.style.display = "inline-block";
            tasksBtn.style.display = "inline-block";
            addProjectBtn.style.display = "inline-block";
        }
    }

    /* =========================
       ACTION BUTTONS
    ========================= */
    function editProject(id) {
        window.location.href = "/projectEdit?id=" + id;
    }
    function detailsProject(id) {
        window.location.href = "/projectDetails.html?id=" + id;
    }
    async function deleteProject(id) {

        if (!confirm("Czy na pewno usunąć projekt?")) {
            return;
        }

        const token = localStorage.getItem("accessToken");

        const res = await fetch("/api/projects/" + id, {
            method: "DELETE",
            headers: {
                "Authorization": "Bearer " + token
            }
        });

        if (res.status === 401) {
            logout();
            return;
        }

        if (!res.ok) {
            alert("Nie udało się usunąć projektu.");
            return;
        }

        await loadProjects();
    }

    /* =========================
       LOAD PROJECTS
    ========================= */
    async function loadProjects() {
        const token = localStorage.getItem("accessToken");

        const res = await fetch("/api/projects", {
            headers: {
                "Authorization": "Bearer " + token
            }
        });

        if (res.status === 401) {
            logout();
            return;
        }

        if (!res.ok) {
            alert("Nie udało się pobrać projektów");
            return;
        }

        const projekty = await res.json();

        const tbody = document.getElementById("projekty-body");

        tbody.innerHTML = projekty.map(p => `
        <tr>
            <td>${p.id}</td>
            <td>${p.name}</td>
            <td>${p.description || ""}</td>
            <td>${formatDateTime(p.createdAt)}</td>
            <td>${p.status}</td>
            <td>${p.ownerId ?? "-"}</td>
            <td class="actions">
                <button onclick="editProject(${p.id})">
                    Edytuj
                </button>
                <button onclick="detailsProject(${p.id})">
                    Szczegóły
                </button>
                <button onclick="deleteProject(${p.id})">
                    Usuń
                </button>
            </td>
        </tr>
    `).join("");
    }

    /* =========================
       HELPERS
    ========================= */
    function formatDateTime(value) {
        if (!value) return "";
        return new Date(value).toLocaleString();
    }

    function formatDate(value) {
        if (!value) return "";
        return new Date(value).toLocaleDateString();
    }

    /* =========================
       LOGOUT
    ========================= */
    function logout() {
        localStorage.removeItem("accessToken");
        localStorage.removeItem("refreshToken");
        window.location.href = "/login";
    }

    /* =========================
       INIT
    ========================= */
    (async function init() {
        const user = await checkAuth();

        if (!user) {
            return;
        }

        setupPermissions(user.role);

        await loadProjects();
    })();
</script>

</body>
</html>
