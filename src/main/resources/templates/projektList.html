<!DOCTYPE HTML>
<html>
<head>
    <meta charset="UTF-8">
    <title>Lista projektów</title>
    <link href="/css/list-style.css" rel="stylesheet"/>
</head>

<body>

<div class="topbar">
    <h2>System zarządzania projektami</h2>

    <button class="logout-btn" onclick="logout()">
        Wyloguj
    </button>
</div>

<div class="root">

    <div class="header-section">
        <h1>Lista projektów</h1>

        <div class="nav-links">
            <a href="/studentList">Studenci</a>
            <a href="/zadanieList">Zadania</a>
            <a class="add-btn" href="/projektEdit">
                + Dodaj projekt
            </a>
        </div>
    </div>

    <div class="table-container">

        <table>
            <thead>
            <tr>
                <th>ID</th>
                <th>Nazwa</th>
                <th>Opis</th>
                <th>Utworzony</th>
                <th>Zmodyfikowany</th>
                <th>Termin</th>
                <th>Akcje</th>
            </tr>
            </thead>

            <tbody id="projekty-body">
            <!-- JS renders rows here -->
            </tbody>

        </table>

    </div>
</div>

<script>
    /* =========================
       AUTH CHECK (GUARD)
    ========================= */
    async function checkAuth() {
        const token = localStorage.getItem("accessToken");

        if (!token) {
            window.location.href = "/login";
            return false;
        }

        const res = await fetch("/api/users/me", {
            headers: {
                "Authorization": "Bearer " + token
            }
        });

        if (res.status === 401) {
            localStorage.removeItem("accessToken");
            localStorage.removeItem("refreshToken");
            window.location.href = "/login";
            return false;
        }

        return true;
    }

    /* =========================
       LOAD PROJECTS
    ========================= */
    async function loadProjects() {
        const token = localStorage.getItem("accessToken");

        const res = await fetch("/api/projekty", {
            headers: {
                "Authorization": "Bearer " + token
            }
        });

        if (res.status === 401) {
            logout();
            return;
        }

        if (!res.ok) {
            alert("Nie udało się pobrać projektów");
            return;
        }

        const projekty = await res.json();

        const tbody = document.getElementById("projekty-body");

        tbody.innerHTML = projekty.map(p => `
        <tr>
            <td>${p.id}</td>
            <td>${p.name}</td>
            <td>${p.description || ""}</td>
            <td>${formatDateTime(p.createdAt)}</td>
            <td>${p.status}</td>
            <td>${p.ownerId ?? "-"}</td>
            <td class="actions">
                <a href="/projektEdit?projektId=${p.projektId}">
                    Edytuj
                </a>

                <a href="/projektEdit?projektId=${p.projektId}&delete=true">
                    Usuń
                </a>
            </td>
        </tr>
    `).join("");
    }

    /* =========================
       HELPERS
    ========================= */
    function formatDateTime(value) {
        if (!value) return "";
        return new Date(value).toLocaleString();
    }

    function formatDate(value) {
        if (!value) return "";
        return new Date(value).toLocaleDateString();
    }

    /* =========================
       LOGOUT
    ========================= */
    function logout() {
        localStorage.removeItem("accessToken");
        localStorage.removeItem("refreshToken");
        window.location.href = "/login";
    }

    /* =========================
       INIT
    ========================= */
    (async function init() {
        const ok = await checkAuth();
        if (ok) {
            await loadProjects();
        }
    })();
</script>

</body>
</html>
