<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Logowanie</title>

    <link th:href="@{/css/auth-style.css}" rel="stylesheet"/>
</head>

<body>

<div class="auth-container">

    <div class="auth-card">

        <h1>Logowanie</h1>

        <form th:action="@{/login}" method="post">

            <div class="form-group">

                <label>E-mail</label>

                <input type="email"
                       name="email"
                       value="login@pbs.edu.pl"
                       required
                       pattern="^[A-Za-z0-9+_.-]+@pbs.edu.pl$"/>

            </div>

            <div class="form-group">

                <label>Hasło</label>

                <input type="password"
                       name="password"
                       minlength="6"
                       required/>

            </div>

            <button class="primary-btn" type="submit">
                Zaloguj się
            </button>

        </form>

        <div class="bottom-link">

            <p>Nie masz konta?</p>

            <a th:href="@{/register}">
                Zarejestruj się
            </a>

        </div>

    </div>

</div>

</body>
</html>
