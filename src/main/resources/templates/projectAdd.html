<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Dodawanie projektu</title>

    <link th:href="@{/css/edit-style.css}" rel="stylesheet"/>
</head>

<body>

<div class="topbar">

    <h2>System zarządzania projektami</h2>

    <form th:action="@{/logout}" method="post">
        <button class="logout-btn" type="submit">
            Wyloguj
        </button>
    </form>

</div>

<div class="root">

    <form th:action="@{/projektAdd}"
          th:object="${projekt}"
          method="POST"
          autocomplete="off">

        <div class="card">

            <h1>Utwórz projekt</h1>

            <!-- błędy formularza -->
            <div class="err-box"
                 th:if="${#fields.hasErrors('*')}">

                <strong>Błędy formularza:</strong>

                <ul>
                    <li th:each="err : ${#fields.errors('*')}"
                        th:text="${err}">
                        Błąd
                    </li>
                </ul>

            </div>

            <!-- nazwa -->
            <div class="form-group">

                <label>Nazwa projektu</label>

                <input type="text"
                       th:field="*{name}"
                       placeholder="Podaj nazwę projektu"

                       th:classappend="${#fields.hasErrors('name')} ? ' input-error' : ''"/>

                <span class="field-error"
                      th:if="${#fields.hasErrors('name')}"
                      th:errors="*{name}">
                </span>

            </div>

            <!-- opis -->
            <div class="form-group">

                <label>Opis projektu</label>

                <textarea rows="5"
                          th:field="*{description}"
                          placeholder="Podaj opis projektu">
                </textarea>

            </div>

            <!-- status -->
            <div class="form-group">

                <label>Status</label>

                <select th:field="*{status}">

                    <option value="active">
                        Active
                    </option>

                    <option value="inactive">
                        Inactive
                    </option>

                    <option value="completed">
                        Completed
                    </option>

                </select>

            </div>

            <!-- przyciski -->
            <div class="buttons">

                <button class="save-btn"
                        type="submit">
                    Utwórz
                </button>

                <button class="cancel-btn"
                        type="button"
                        onclick="window.location.href='/projektList'">
                    Anuluj
                </button>

            </div>

        </div>

    </form>

</div>

</body>
</html>
